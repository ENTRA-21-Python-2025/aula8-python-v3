<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 7 - Javascript parte 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
</head>
<body>
    <div class="container pt-5" id="container">
        <h1>Minhas tarefas</h1>
       
        <form class="d-flex gap-4 align-items-end">
            <div class="flex-fill">
                <label for="tarefa" class="form-label">Tarefa</label>
                <input type="text" id="tarefa" class="form-control">
            </div>
            <div>
                <button type="button" class="btn btn-primary">Adicionar</button>
            </div>
        </form>

        <div class="mt-5">
            <strong class="d-block mb-4">Lista:</strong>

            <ul class="list-group">
                <li class="list-group-item">primeira posição</li>
                <li class="list-group-item">A second item</li>
                <li class="list-group-item">A third item</li>
                <li class="list-group-item">A fourth item</li>
                <li class="list-group-item">And a fifth one</li>
            </ul>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous"></script>
    <script src="./scripts/main.js"></script>
</body>
</html>
